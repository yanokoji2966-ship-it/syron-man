<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001A33;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="500" fill="url(#blueGradient)" />
  
  <!-- Border -->
  <rect x="25" y="25" width="450" height="450" fill="none" stroke="url(#goldGradient)" stroke-width="10" />
  
  <!-- Icon (Stylized S) -->
  <path d="M150 150 L350 150 L350 200 L200 200 L200 250 L350 250 L350 350 L150 350 L150 300 L300 300 L300 250 L150 250 Z" fill="url(#goldGradient)" />
  
  <!-- Text -->
  <text x="250" y="420" font-family="Arial, sans-serif" font-weight="bold" font-size="60" text-anchor="middle" fill="#FFFFFF" letter-spacing="5">STYLE MAN</text>
  <text x="250" y="460" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#FFD700" letter-spacing="2">MODA MASCULINA</text>
</svg>
